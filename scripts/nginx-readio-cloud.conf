# Readio Cloud Nginx Configuration (Full Template)
# Covers both Production and Pre-production environments.
# Path: /etc/nginx/sites-available/readio-cloud

# ---------------------------------------------------------
# 1. PRODUCTION (api.readio.top)
# ---------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name api.readio.top;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://api.readio.top$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.readio.top;

    # SSL Configuration (Cloudflare Origin CA)
    ssl_certificate /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Cloudflare Real-IP Configuration
    include /etc/nginx/snippets/cloudflare-realip.conf;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/readio-cloud-prod.access.log;
    error_log /var/log/nginx/readio-cloud-prod.error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
    }
}

# ---------------------------------------------------------
# 2. PRE-PRODUCTION (api-pre.readio.top)
# ---------------------------------------------------------

