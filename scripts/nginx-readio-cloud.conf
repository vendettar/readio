# Readio Cloud Nginx Configuration (Full Template)
# Covers both Production and Pre-production environments.
# Path: /etc/nginx/sites-available/readio-cloud

# ---------------------------------------------------------
# 1. PRODUCTION (readio.top)
# ---------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name readio.top www.readio.top;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://readio.top$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name readio.top www.readio.top;

    # SSL Configuration (Certbot will manage these)
    # ssl_certificate /etc/letsencrypt/live/readio.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/readio.top/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/readio-cloud-prod.access.log;
    error_log /var/log/nginx/readio-cloud-prod.error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
    }
}

# ---------------------------------------------------------
# 2. PRE-PRODUCTION (pre.readio.top)
# ---------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name pre.readio.top;

    location / {
        return 301 https://pre.readio.top$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pre.readio.top;

    # SSL Configuration (Certbot will manage these)
    # ssl_certificate /etc/letsencrypt/live/pre.readio.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pre.readio.top/privkey.pem;

    access_log /var/log/nginx/readio-cloud-pre.access.log;
    error_log /var/log/nginx/readio-cloud-pre.error.log;

    location / {
        proxy_pass http://127.0.0.1:8079;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
    }
}
