services:
  readio-api:
    image: ghcr.io/${REPO_OWNER}/readio-cloud-api:${IMAGE_TAG}
    container_name: ${CONTAINER_NAME}
    restart: always
    ports:
      - "${HOST_PORT}:${APP_PORT}"
    volumes:
      - ${DATA_DIR}:/app/data
    env_file:
      - ${ENV_FILE_PATH}
    environment:
      - PORT=${APP_PORT}
      - READIO_CLOUD_DB_PATH=/app/data/readio.db
    healthcheck:
      test: ["CMD", "./cloud-api", "-check-health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
