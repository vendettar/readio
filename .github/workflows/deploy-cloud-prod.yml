name: Deploy Cloud (Production)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''

concurrency:
  group: deploy-cloud-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  call-deploy:
    uses: ./.github/workflows/_deploy-cloud-base.yml
    with:
      environment: cloud-production
      deploy_env: production
      image_tag_suffix: prod
      require_main_branch: true
      confirm_required: true
      confirm_input: ${{ github.event.inputs.confirm }}
    secrets: inherit
