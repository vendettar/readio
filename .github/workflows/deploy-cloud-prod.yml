name: Deploy Cloud (Production)

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''

concurrency:
  group: deploy-cloud-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.event.inputs.confirm_deploy == 'deploy' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: cloud-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get Short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./apps/cloud-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/readio-cloud-api-prod:${{ steps.slug.outputs.sha8 }}

      - name: Configure SSH for Docker Context
        env:
          CLOUD_SSH_HOST: ${{ secrets.CLOUD_SSH_HOST }}
          CLOUD_SSH_PORT: ${{ secrets.CLOUD_SSH_PORT }}
          CLOUD_SSH_USER: ${{ secrets.CLOUD_SSH_USER }}
          CLOUD_SSH_PRIVATE_KEY: ${{ secrets.CLOUD_SSH_PRIVATE_KEY }}
          CLOUD_SSH_KNOWN_HOSTS: ${{ secrets.CLOUD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$CLOUD_SSH_PRIVATE_KEY" > ~/.ssh/readio_cloud
          chmod 600 ~/.ssh/readio_cloud
          printf '%s\n' "$CLOUD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host ${CLOUD_SSH_HOST}
            HostName ${CLOUD_SSH_HOST}
            Port ${CLOUD_SSH_PORT}
            User ${CLOUD_SSH_USER}
            IdentityFile ~/.ssh/readio_cloud
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy through Docker Context
        env:
          CLOUD_SSH_HOST: ${{ secrets.CLOUD_SSH_HOST }}
          CLOUD_SSH_PORT: ${{ secrets.CLOUD_SSH_PORT }}
          CLOUD_SSH_USER: ${{ secrets.CLOUD_SSH_USER }}
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ steps.slug.outputs.sha8 }}
          READIO_ADMIN_TOKEN: ${{ secrets.READIO_ADMIN_TOKEN }}
          PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
          PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
          READIO_ASR_RELAY_PUBLIC_TOKEN: ${{ secrets.READIO_ASR_RELAY_PUBLIC_TOKEN }}
          READIO_ASR_WORKER_SHARED_SECRET: ${{ secrets.READIO_ASR_WORKER_SHARED_SECRET }}
          READIO_GRAFANA_OTLP_TOKEN: ${{ secrets.READIO_GRAFANA_OTLP_TOKEN }}
          READIO_ASR_ALLOWED_ORIGINS: ${{ vars.READIO_ASR_ALLOWED_ORIGINS }}
          READIO_DISCOVERY_ALLOWED_ORIGINS: ${{ vars.READIO_DISCOVERY_ALLOWED_ORIGINS }}
          READIO_PROXY_ALLOWED_ORIGINS: ${{ vars.READIO_PROXY_ALLOWED_ORIGINS }}
          READIO_GRAFANA_OTLP_ENDPOINT: ${{ vars.READIO_GRAFANA_OTLP_ENDPOINT }}
          READIO_GRAFANA_OTLP_INSTANCE_ID: ${{ vars.READIO_GRAFANA_OTLP_INSTANCE_ID }}
          READIO_TRUSTED_PROXY_CIDRS: ${{ vars.READIO_TRUSTED_PROXY_CIDRS }}
          READIO_ASR_WORKER_BASE_URL: ${{ vars.READIO_ASR_WORKER_BASE_URL }}
          READIO_EN_DICTIONARY_API_URL: ${{ vars.READIO_EN_DICTIONARY_API_URL }}
          READIO_EN_DICTIONARY_API_TRANSPORT: ${{ vars.READIO_EN_DICTIONARY_API_TRANSPORT }}
          VITE_GRAFANA_FARO_URL: ${{ vars.VITE_GRAFANA_FARO_URL }}
          VITE_GRAFANA_FARO_APP_NAME: ${{ vars.VITE_GRAFANA_FARO_APP_NAME }}
          VITE_GRAFANA_FARO_ENV: ${{ vars.VITE_GRAFANA_FARO_ENV }}
          VITE_GRAFANA_FARO_SAMPLE_RATE: ${{ vars.VITE_GRAFANA_FARO_SAMPLE_RATE }}
        run: |
          set -euo pipefail
          make context-setup
          make deploy-prod CONFIRM=deploy
          make prune-images-prod

      - name: Cleanup old GHCR package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'readio-cloud-api-prod'
          package-type: 'container'
          min-versions-to-keep: 10
