name: Deploy Cloud (Production)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''
      image_tag:
        description: 'Version tag to roll back to (e.g. v1.2.1). Must be an existing prod image tag. Leave empty to build from current ref.'
        required: false
        default: ''


concurrency:
  group: deploy-cloud-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  call-deploy:
    if: |
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/_deploy-cloud-base.yml
    with:
      environment: cloud-production
      deploy_env: production
      image_tag_suffix: prod
      require_main_branch: false
      confirm_required: ${{ github.event_name == 'workflow_dispatch' }}
      confirm_input: ${{ github.event.inputs.confirm }}
      require_release_branch: true
      image_tag: ${{ github.event.inputs.image_tag }}
    secrets: inherit
