name: Deploy Cloud (Pre-production)

on:
  pull_request:
    branches:
      - main
    types: [closed]
    paths:
      - 'apps/cloud-api/**'
      - 'infra/**'
      - 'Makefile'
      - 'docker-compose.readio.yml'
      - 'scripts/nginx-readio-cloud.conf'
      - 'scripts/readio-cloud-prune-images.sh'
      - '.github/workflows/deploy-cloud-preprod.yml'
      - '.github/workflows/_deploy-cloud-base.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        default: ''

concurrency:
  group: deploy-cloud-preprod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  call-deploy:
    if: (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-cloud-base.yml
    with:
      environment: cloud-preproduction
      deploy_env: preproduction
      image_tag_suffix: pre
      require_main_branch: true
      confirm_required: ${{ github.event_name == 'workflow_dispatch' }}
      confirm_input: ${{ github.event.inputs.confirm }}
    secrets: inherit
