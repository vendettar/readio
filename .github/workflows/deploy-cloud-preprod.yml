name: Deploy Cloud (Pre-production)

on:
  push:
    branches:
      - pre
    paths:
      - 'apps/cloud-api/**'
      - '.github/workflows/deploy-cloud-preprod.yml'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/cloud-api
          push: true

          tags: ghcr.io/${{ github.repository_owner }}/readio-cloud-api:pre

      - name: Prepare Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.READIO_CLOUD_SSH_HOST }}
          username: ${{ vars.READIO_CLOUD_SSH_USER }}
          key: ${{ secrets.READIO_CLOUD_SSH_KEY }}
          script: |
            mkdir -p /etc/readio

      - name: Transfer Docker Compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.READIO_CLOUD_SSH_HOST }}
          username: ${{ vars.READIO_CLOUD_SSH_USER }}
          key: ${{ secrets.READIO_CLOUD_SSH_KEY }}
          source: "docker-compose.readio.yml"
          target: "/etc/readio/"

      - name: Deploy and Wait for Health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.READIO_CLOUD_SSH_HOST }}
          username: ${{ vars.READIO_CLOUD_SSH_USER }}
          key: ${{ secrets.READIO_CLOUD_SSH_KEY }}
          script: |
            env_file="/etc/readio/readio-pre.env"
            touch "$env_file" && chmod 600 "$env_file"
            
            # Clean sync function using printf (safe for special chars)
            sync_env() {
              local key=$1
              local val=$2
              if [ -n "$val" ]; then
                grep -q "^${key}=" "$env_file" && sed -i "/^${key}=/c\\${key}=${val}" "$env_file" || printf '%s=%s\n' "$key" "$val" >> "$env_file"
              fi
            }

            sync_env "READIO_ADMIN_TOKEN" "${{ secrets.READIO_ADMIN_TOKEN }}"
            sync_env "PODCAST_INDEX_API_KEY" "${{ secrets.PODCAST_INDEX_API_KEY }}"
            sync_env "PODCAST_INDEX_API_SECRET" "${{ secrets.PODCAST_INDEX_API_SECRET }}"
            sync_env "READIO_ASR_RELAY_PUBLIC_TOKEN" "${{ secrets.READIO_ASR_RELAY_PUBLIC_TOKEN }}"
            sync_env "READIO_ASR_WORKER_SHARED_SECRET" "${{ secrets.READIO_ASR_WORKER_SHARED_SECRET }}"
            sync_env "READIO_ASR_API_KEY" "${{ secrets.READIO_ASR_API_KEY }}"
            sync_env "READIO_OPENAI_API_KEY" "${{ secrets.READIO_OPENAI_API_KEY }}"
            sync_env "READIO_GRAFANA_OTLP_TOKEN" "${{ secrets.READIO_GRAFANA_OTLP_TOKEN }}"
            sync_env "READIO_GRAFANA_OTLP_ENDPOINT" "${{ secrets.READIO_GRAFANA_OTLP_ENDPOINT }}"
            sync_env "READIO_GRAFANA_OTLP_INSTANCE_ID" "${{ secrets.READIO_GRAFANA_OTLP_INSTANCE_ID }}"
            sync_env "READIO_ASR_ALLOWED_ORIGINS" "${{ vars.READIO_ASR_ALLOWED_ORIGINS }}"
            sync_env "READIO_PROXY_ALLOWED_ORIGINS" "${{ vars.READIO_PROXY_ALLOWED_ORIGINS }}"

            cd /etc/readio
            docker compose -f docker-compose.readio.yml pull readio-api-pre
            docker compose -f docker-compose.readio.yml up -d readio-api-pre --wait --remove-orphans
            docker image prune -f

      - name: Cleanup old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'readio-cloud-api'
          package-type: 'container'
          min-versions-to-keep: 3
          delete-only-untagged-versions: 'true'
