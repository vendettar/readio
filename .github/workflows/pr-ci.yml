name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Change Detection ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'apps/cloud-ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'biome.json'
              - 'Makefile'
              - 'docker-compose.readio.yml'
              - '.github/workflows/pr-ci.yml'
            api:
              - 'apps/cloud-api/**'
              - 'Makefile'
              - 'docker-compose.readio.yml'
              - '.github/workflows/pr-ci.yml'

  # ─── Cloud UI ───────────────────────────────────────────────────────
  cloud-ui:
    needs: changes
    if: ${{ needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: License Check
        run: pnpm --filter @readio/cloud-ui exec license-checker-rseidelsohn --summary --failOn 'GPL;AGPL;LGPL'

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Lint (Cloud UI)
        run: pnpm -C apps/cloud-ui lint

      - name: DB Access Guard
        run: pnpm -C apps/cloud-ui lint:db-guard

      - name: I18n Coverage Audit
        run: pnpm -C apps/cloud-ui i18n:check

      - name: Selector Optimization Audit
        run: pnpm -C apps/cloud-ui lint:selectors

      - name: Route Country Guard
        run: pnpm -C apps/cloud-ui lint:route-guards

      - name: Legacy Podcast Route Ban
        run: pnpm -C apps/cloud-ui lint:legacy-route-ban

      - name: Typecheck (Cloud UI)
        run: pnpm -C apps/cloud-ui typecheck

      - name: Test (Cloud UI)
        run: pnpm -C apps/cloud-ui test:run

      - name: Build (Cloud UI)
        run: pnpm -C apps/cloud-ui build

      - name: Bundle Size Budget
        run: pnpm -C apps/cloud-ui check-size

  # ─── Cloud API ──────────────────────────────────────────────────────
  cloud-api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: apps/cloud-api/go.sum

      - name: Go Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: apps/cloud-api
          args: --timeout=5m

      - name: Go Test
        working-directory: apps/cloud-api
        run: go test ./...
