name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Cloud UI ───────────────────────────────────────────────────────
  cloud-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: License Check
        run: pnpm --filter @readio/cloud-ui exec license-checker-rseidelsohn --summary --failOn 'GPL;AGPL;LGPL'

      - name: Install Ripgrep for DB Guard
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Lint (Cloud UI)
        run: pnpm -C apps/cloud-ui lint

      - name: DB Access Guard
        run: pnpm -C apps/cloud-ui lint:db-guard

      - name: I18n Coverage Audit
        run: pnpm -C apps/cloud-ui i18n:check

      - name: Selector Optimization Audit
        run: pnpm -C apps/cloud-ui lint:selectors

      - name: Route Country Guard
        run: pnpm -C apps/cloud-ui lint:route-guards

      - name: Legacy Podcast Route Ban
        run: pnpm -C apps/cloud-ui lint:legacy-route-ban

      - name: Typecheck (Cloud UI)
        run: pnpm -C apps/cloud-ui typecheck

      - name: Build (Cloud UI)
        run: pnpm -C apps/cloud-ui build

      - name: Bundle Size Budget
        run: pnpm -C apps/cloud-ui check-size

  # ─── Cloud API ──────────────────────────────────────────────────────
  cloud-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Go Lint (golangci-lint)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.11.4
          working-directory: apps/cloud-api
          args: --timeout=5m

      - name: Go Test
        working-directory: apps/cloud-api
        run: go test ./...

  # ─── apps/docs (optional, non-blocking) ─────────────────────────────
  docs:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'docs') }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (docs)
        run: pnpm -C apps/docs typecheck

      - name: Build (docs)
        run: pnpm -C apps/docs build
