name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Lite ───────────────────────────────────────────────────────────
  lite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Lite)
        run: pnpm --filter @readio/lite lint

      - name: Typecheck (Lite)
        run: pnpm --filter @readio/lite typecheck

      - name: Build (Lite)
        run: pnpm --filter @readio/lite build

  # ─── Cloud UI ───────────────────────────────────────────────────────
  cloud-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Cloud UI)
        run: pnpm -C apps/cloud-ui lint

      - name: Typecheck (Cloud UI)
        run: pnpm -C apps/cloud-ui typecheck

      - name: Build (Cloud UI)
        run: pnpm -C apps/cloud-ui build

  # ─── Cloud API ──────────────────────────────────────────────────────
  cloud-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go Lint (golangci-lint)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v1.64.8
          working-directory: apps/cloud-api
          args: --timeout=5m

      - name: Go Test
        working-directory: apps/cloud-api
        run: go test ./...

  # ─── packages/core ──────────────────────────────────────────────────
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (core)
        run: pnpm -C packages/core typecheck

      - name: Build (core)
        run: pnpm -C packages/core build

  # ─── apps/docs (optional, non-blocking) ─────────────────────────────
  docs:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'docs') }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (docs)
        run: pnpm -C apps/docs typecheck

      - name: Build (docs)
        run: pnpm -C apps/docs build
