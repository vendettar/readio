name: Reusable Cloud Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_env:
        required: true
        type: string
      image_tag_suffix:
        required: true
        type: string
      require_main_branch:
        required: false
        type: boolean
        default: false
      confirm_required:
        required: false
        type: boolean
        default: false
      confirm_input:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    if: ((!inputs.confirm_required) || (inputs.confirm_input == 'deploy')) && ((!inputs.require_main_branch) || (github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./apps/cloud-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/readio-cloud-api-${{ inputs.image_tag_suffix }}:${{ steps.slug.outputs.sha8 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH for Docker Context
        env:
          CLOUD_SSH_HOST: ${{ secrets.CLOUD_SSH_HOST }}
          CLOUD_SSH_PORT: ${{ secrets.CLOUD_SSH_PORT }}
          CLOUD_SSH_USER: ${{ secrets.CLOUD_SSH_USER }}
          CLOUD_SSH_PRIVATE_KEY: ${{ secrets.CLOUD_SSH_PRIVATE_KEY }}
          CLOUD_SSH_KNOWN_HOSTS: ${{ secrets.CLOUD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          required_vars="CLOUD_SSH_HOST CLOUD_SSH_PORT CLOUD_SSH_USER CLOUD_SSH_PRIVATE_KEY CLOUD_SSH_KNOWN_HOSTS"
          for var in $required_vars; do
            if [ -z "${!var:-}" ]; then
              echo "$var is required for cloud deployment." >&2
              exit 1
            fi
          done

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/readio_cloud
          ${{ secrets.CLOUD_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/readio_cloud
          printf '%s\n' "${{ secrets.CLOUD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.CLOUD_SSH_HOST }}
            HostName ${{ secrets.CLOUD_SSH_HOST }}
            Port ${{ secrets.CLOUD_SSH_PORT }}
            User ${{ secrets.CLOUD_SSH_USER }}
            IdentityFile ~/.ssh/readio_cloud
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

          echo "Verifying SSH access and Docker permissions..."
          ssh -o ConnectTimeout=10 -i ~/.ssh/readio_cloud -p ${{ secrets.CLOUD_SSH_PORT }} ${{ secrets.CLOUD_SSH_USER }}@${{ secrets.CLOUD_SSH_HOST }} "docker version"

      - name: Deploy through Docker Context
        env:
          CLOUD_SSH_HOST: ${{ secrets.CLOUD_SSH_HOST }}
          CLOUD_SSH_PORT: ${{ secrets.CLOUD_SSH_PORT }}
          CLOUD_SSH_USER: ${{ secrets.CLOUD_SSH_USER }}
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ steps.slug.outputs.sha8 }}
          READIO_ADMIN_TOKEN: ${{ secrets.READIO_ADMIN_TOKEN }}
          PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
          PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
          READIO_ASR_RELAY_PUBLIC_TOKEN: ${{ secrets.READIO_ASR_RELAY_PUBLIC_TOKEN }}
          READIO_ASR_WORKER_SHARED_SECRET: ${{ secrets.READIO_ASR_WORKER_SHARED_SECRET }}
          READIO_GRAFANA_OTLP_TOKEN: ${{ secrets.READIO_GRAFANA_OTLP_TOKEN }}
          READIO_GRAFANA_OTLP_HEADERS: ${{ secrets.READIO_GRAFANA_OTLP_HEADERS }}
          READIO_GRAFANA_LOKI_TOKEN: ${{ secrets.READIO_GRAFANA_LOKI_TOKEN }}
          READIO_ASR_ALLOWED_ORIGINS: ${{ vars.READIO_ASR_ALLOWED_ORIGINS }}
          READIO_DISCOVERY_ALLOWED_ORIGINS: ${{ vars.READIO_DISCOVERY_ALLOWED_ORIGINS }}
          READIO_PROXY_ALLOWED_ORIGINS: ${{ vars.READIO_PROXY_ALLOWED_ORIGINS }}
          READIO_GRAFANA_OTLP_ENDPOINT: ${{ vars.READIO_GRAFANA_OTLP_ENDPOINT }}
          READIO_GRAFANA_OTLP_INSTANCE_ID: ${{ vars.READIO_GRAFANA_OTLP_INSTANCE_ID }}
          READIO_DEPLOY_ENV: ${{ inputs.deploy_env }}
          READIO_GRAFANA_LOKI_URL: ${{ vars.READIO_GRAFANA_LOKI_URL }}
          READIO_GRAFANA_LOKI_USER: ${{ vars.READIO_GRAFANA_LOKI_USER }}
          READIO_LOKI_LOG_LEVEL: ${{ vars.READIO_LOKI_LOG_LEVEL }}
          READIO_LOKI_BATCH_SIZE: ${{ vars.READIO_LOKI_BATCH_SIZE }}
          READIO_LOKI_FLUSH_INTERVAL_SECONDS: ${{ vars.READIO_LOKI_FLUSH_INTERVAL_SECONDS }}
          READIO_LOKI_QUEUE_SIZE: ${{ vars.READIO_LOKI_QUEUE_SIZE }}
          READIO_TRUSTED_PROXY_CIDRS: ${{ vars.READIO_TRUSTED_PROXY_CIDRS }}
          READIO_ASR_WORKER_BASE_URL: ${{ vars.READIO_ASR_WORKER_BASE_URL }}
          READIO_EN_DICTIONARY_API_URL: ${{ vars.READIO_EN_DICTIONARY_API_URL }}
          READIO_EN_DICTIONARY_API_TRANSPORT: ${{ vars.READIO_EN_DICTIONARY_API_TRANSPORT }}
          VITE_GRAFANA_FARO_URL: ${{ vars.VITE_GRAFANA_FARO_URL }}
          VITE_GRAFANA_FARO_APP_NAME: ${{ vars.VITE_GRAFANA_FARO_APP_NAME }}
          VITE_GRAFANA_FARO_ENV: ${{ vars.VITE_GRAFANA_FARO_ENV }}
          VITE_GRAFANA_FARO_SAMPLE_RATE: ${{ vars.VITE_GRAFANA_FARO_SAMPLE_RATE }}
          PODCAST_INDEX_USER_AGENT: ${{ vars.PODCAST_INDEX_USER_AGENT }}
          READIO_SUDO_COMMAND_ALLOWLIST: ${{ vars.READIO_SUDO_COMMAND_ALLOWLIST }}
          READIO_TRACING_ENABLED: ${{ vars.READIO_TRACING_ENABLED }}
          READIO_TRACING_SAMPLE_RATIO: ${{ vars.READIO_TRACING_SAMPLE_RATIO }}
        run: |
          set -euo pipefail
          make context-setup
          if [ "${READIO_DEPLOY_ENV}" = "production" ]; then
            make deploy-prod CONFIRM=deploy
            make prune-images-prod
          else
            make deploy-pre
            make prune-images-pre
          fi

      - name: Cleanup old GHCR package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'readio-cloud-api-${{ inputs.image_tag_suffix }}'
          package-type: 'container'
          min-versions-to-keep: 10
