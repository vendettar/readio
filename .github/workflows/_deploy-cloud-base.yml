name: Reusable Cloud Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_env:
        required: true
        type: string
      image_tag_suffix:
        required: true
        type: string
      require_main_branch:
        required: false
        type: boolean
        default: false
      confirm_required:
        required: false
        type: boolean
        default: false
      confirm_input:
        required: false
        type: string
        default: ""
      require_release_branch:
        required: false
        type: boolean
        default: false
      image_tag:
        required: false
        type: string
        default: ""


jobs:
  deploy:
    if: ((!inputs.confirm_required) || (inputs.confirm_input == 'deploy')) && ((!inputs.require_main_branch) || (github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for branch containment check

      - name: Branch Guard
        if: inputs.require_release_branch == true
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "Checking if tag ${{ github.ref_name }} is on 'release' branch..."
            CONTAINED=$(git branch -r --contains "${{ github.sha }}" | grep "origin/release" || true)
            if [ -z "$CONTAINED" ]; then
              echo "::error::Deployment blocked! Tag ${{ github.ref_name }} is NOT on the 'release' branch."
              exit 1
            fi
            echo "Branch check passed: tag ${{ github.ref_name }} is on 'release' branch."
          else
            echo "Checking if workflow_dispatch is triggered from 'release' branch..."
            if [[ "${{ github.ref }}" != "refs/heads/release" ]]; then
              echo "::error::Deployment blocked! workflow_dispatch must be triggered from the 'release' branch, got '${{ github.ref_name }}'."
              exit 1
            fi
            echo "Branch check passed: triggered from 'release' branch."
          fi

      - name: Get Version
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "${INPUT_IMAGE_TAG}" ]; then
            # Validate image_tag format: must be vX.Y.Z (with optional suffix)
            if ! [[ "${INPUT_IMAGE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "::error::image_tag '${INPUT_IMAGE_TAG}' is not a valid version tag. Must match vX.Y.Z (e.g. v1.2.3)."
              exit 1
            fi
            # Rollback: use the explicitly specified image tag, skip build
            VERSION="${INPUT_IMAGE_TAG}"
            IS_ROLLBACK="true"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${REF_NAME}"
            IS_ROLLBACK="false"
          else
            if [[ "${{ github.ref_name }}" == "release" ]]; then
              echo "::warning::Building short-SHA image from release branch. This is an emergency deploy — create a version tag after validation to restore the normal release line."
            else
              echo "Building short-SHA image for ${{ github.ref_name }} branch."
            fi
            VERSION=$(echo "${GITHUB_SHA}" | cut -c1-8)
            IS_ROLLBACK="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_rollback=${IS_ROLLBACK}" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        if: steps.meta.outputs.is_rollback != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./apps/cloud-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/readio-cloud-api-${{ inputs.image_tag_suffix }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH for Docker Context
        env:
          CLOUD_SSH_HOST: ${{ secrets.CLOUD_SSH_HOST }}
          CLOUD_SSH_PORT: ${{ secrets.CLOUD_SSH_PORT }}
          CLOUD_SSH_USER: ${{ secrets.CLOUD_SSH_USER }}
          CLOUD_SSH_PRIVATE_KEY: ${{ secrets.CLOUD_SSH_PRIVATE_KEY }}
          CLOUD_SSH_KNOWN_HOSTS: ${{ secrets.CLOUD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          required_vars="CLOUD_SSH_HOST CLOUD_SSH_PORT CLOUD_SSH_USER CLOUD_SSH_PRIVATE_KEY CLOUD_SSH_KNOWN_HOSTS"
          for var in $required_vars; do
            if [ -z "${!var:-}" ]; then
              echo "$var is required for cloud deployment." >&2
              exit 1
            fi
          done

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/readio_cloud
          ${{ secrets.CLOUD_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/readio_cloud
          printf '%s\n' "${{ secrets.CLOUD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.CLOUD_SSH_HOST }}
            HostName ${{ secrets.CLOUD_SSH_HOST }}
            Port ${{ secrets.CLOUD_SSH_PORT }}
            User ${{ secrets.CLOUD_SSH_USER }}
            IdentityFile ~/.ssh/readio_cloud
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

          echo "Verifying SSH access and Docker permissions..."
          ssh -o ConnectTimeout=10 -i ~/.ssh/readio_cloud -p ${{ secrets.CLOUD_SSH_PORT }} ${{ secrets.CLOUD_SSH_USER }}@${{ secrets.CLOUD_SSH_HOST }} "docker version"

      - name: Deploy through Docker Context
        env:
          CLOUD_SSH_HOST: ${{ secrets.CLOUD_SSH_HOST }}
          CLOUD_SSH_PORT: ${{ secrets.CLOUD_SSH_PORT }}
          CLOUD_SSH_USER: ${{ secrets.CLOUD_SSH_USER }}
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
          READIO_ADMIN_TOKEN: ${{ secrets.READIO_ADMIN_TOKEN }}
          PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
          PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
          READIO_ASR_RELAY_PUBLIC_TOKEN: ${{ secrets.READIO_ASR_RELAY_PUBLIC_TOKEN }}
          READIO_ASR_WORKER_SHARED_SECRET: ${{ secrets.READIO_ASR_WORKER_SHARED_SECRET }}
          READIO_GRAFANA_OTLP_TOKEN: ${{ secrets.READIO_GRAFANA_OTLP_TOKEN }}
          READIO_GRAFANA_OTLP_HEADERS: ${{ secrets.READIO_GRAFANA_OTLP_HEADERS }}
          READIO_GRAFANA_LOKI_TOKEN: ${{ secrets.READIO_GRAFANA_LOKI_TOKEN }}
          READIO_ASR_ALLOWED_ORIGINS: ${{ vars.READIO_ASR_ALLOWED_ORIGINS }}
          READIO_DISCOVERY_ALLOWED_ORIGINS: ${{ vars.READIO_DISCOVERY_ALLOWED_ORIGINS }}
          READIO_PROXY_ALLOWED_ORIGINS: ${{ vars.READIO_PROXY_ALLOWED_ORIGINS }}
          READIO_GRAFANA_OTLP_ENDPOINT: ${{ vars.READIO_GRAFANA_OTLP_ENDPOINT }}
          READIO_GRAFANA_OTLP_INSTANCE_ID: ${{ vars.READIO_GRAFANA_OTLP_INSTANCE_ID }}
          READIO_DEPLOY_ENV: ${{ inputs.deploy_env }}
          READIO_GRAFANA_LOKI_URL: ${{ vars.READIO_GRAFANA_LOKI_URL }}
          READIO_GRAFANA_LOKI_USER: ${{ vars.READIO_GRAFANA_LOKI_USER }}
          READIO_LOKI_LOG_LEVEL: ${{ vars.READIO_LOKI_LOG_LEVEL }}
          READIO_LOKI_BATCH_SIZE: ${{ vars.READIO_LOKI_BATCH_SIZE }}
          READIO_LOKI_FLUSH_INTERVAL_SECONDS: ${{ vars.READIO_LOKI_FLUSH_INTERVAL_SECONDS }}
          READIO_LOKI_QUEUE_SIZE: ${{ vars.READIO_LOKI_QUEUE_SIZE }}
          READIO_TRUSTED_PROXY_CIDRS: ${{ vars.READIO_TRUSTED_PROXY_CIDRS }}
          READIO_ASR_WORKER_BASE_URL: ${{ vars.READIO_ASR_WORKER_BASE_URL }}
          READIO_EN_DICTIONARY_API_URL: ${{ vars.READIO_EN_DICTIONARY_API_URL }}
          READIO_EN_DICTIONARY_API_TRANSPORT: ${{ vars.READIO_EN_DICTIONARY_API_TRANSPORT }}
          VITE_GRAFANA_FARO_URL: ${{ vars.VITE_GRAFANA_FARO_URL }}
          VITE_GRAFANA_FARO_APP_NAME: ${{ vars.VITE_GRAFANA_FARO_APP_NAME }}
          VITE_GRAFANA_FARO_ENV: ${{ vars.VITE_GRAFANA_FARO_ENV }}
          VITE_GRAFANA_FARO_SAMPLE_RATE: ${{ vars.VITE_GRAFANA_FARO_SAMPLE_RATE }}
          PODCAST_INDEX_USER_AGENT: ${{ vars.PODCAST_INDEX_USER_AGENT }}
          READIO_SUDO_COMMAND_ALLOWLIST: ${{ vars.READIO_SUDO_COMMAND_ALLOWLIST }}
          READIO_TRACING_ENABLED: ${{ vars.READIO_TRACING_ENABLED }}
          READIO_TRACING_SAMPLE_RATIO: ${{ vars.READIO_TRACING_SAMPLE_RATIO }}
          READIO_HOST_METRICS_INTERVAL_SECONDS: ${{ vars.READIO_HOST_METRICS_INTERVAL_SECONDS }}
        run: |
          set -euo pipefail
          make context-setup
          if [ "${READIO_DEPLOY_ENV}" = "production" ]; then
            make deploy-prod CONFIRM=deploy
            make prune-images-prod
          else
            make deploy-pre
            make prune-images-pre
          fi

      - name: Smoke Test
        if: vars.READIO_SMOKE_TEST_URL != ''
        run: |
          echo "Probing endpoint: ${{ vars.READIO_SMOKE_TEST_URL }}"
          # No sleep needed as Makefile uses 'docker compose up -d --wait'
          # --retry-all-errors ensures we retry on 502/503 during startup
          curl --fail --retry 5 --retry-all-errors --retry-delay 5 --max-time 10 "${{ vars.READIO_SMOKE_TEST_URL }}"

      - name: Cleanup old GHCR package versions
        if: success() && steps.meta.outputs.is_rollback != 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'readio-cloud-api-${{ inputs.image_tag_suffix }}'
          package-type: 'container'
          min-versions-to-keep: 10
