---
- name: Bootstrap Readio Cloud VPS
  hosts: "{{ readio_target_hosts | default('readio_vps') }}"
  become: true
  gather_facts: true

  vars:
    readio_deploy_user: ""
    readio_deploy_user_home: "/home/{{ readio_deploy_user }}"
    readio_deploy_user_shell: /bin/bash
    readio_deploy_user_ssh_keys: []
    readio_sudo_command_allowlist: []

    readio_pre_data_root: /etc/readio/pre/data
    readio_prod_data_root: /etc/readio/prod/data
    readio_data_directory_mode: "0770"

    readio_nginx_site_name: readio-cloud
    readio_nginx_site_source: "{{ playbook_dir }}/../../scripts/nginx-readio-cloud.conf"
    readio_nginx_sites_available_dir: /etc/nginx/sites-available
    readio_nginx_sites_enabled_dir: /etc/nginx/sites-enabled
    readio_nginx_enable_site: true

    readio_manage_unattended_upgrades: false

    readio_journald_system_max_use: 100M
    readio_journald_runtime_max_use: 50M
    readio_journald_max_retention_sec: 7day
    ansible_python_interpreter: /usr/bin/python3

    readio_sysctl_settings:
      - { name: vm.swappiness, value: "10" }
      - { name: vm.dirty_ratio, value: "10" }
      - { name: vm.dirty_background_ratio, value: "5" }
      - { name: net.core.somaxconn, value: "1024" }
      - { name: net.ipv4.tcp_tw_reuse, value: "1" }
      - { name: net.ipv4.tcp_fin_timeout, value: "15" }
      - { name: net.ipv4.ip_local_port_range, value: "1024 65535" }

    readio_redundant_services:
      - snapd
      - snapd.socket
      - fwupd
      - multipathd
      - packagekit
      - udisks2
      - cloud-init

    readio_bash_aliases: |
      alias mem='free -h'
      alias disk='du -ahx / | sort -rh | head -n 20'
      alias logs='docker compose -f /etc/readio/docker-compose.readio.yml logs -f'
      alias gitlg="git log --graph --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%cr) %C(bold blue)<%an>%Creset' --abbrev-commit"
      export NODE_OPTIONS="--max-old-space-size=256"

    docker_apt_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf

  pre_tasks:
    - name: Validate supported Ubuntu release
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == "Ubuntu"
          - ansible_facts['distribution_release'] == "noble"
        fail_msg: "This playbook is scoped to Ubuntu Noble VPS hosts."

    - name: Validate deployment user variables
      ansible.builtin.assert:
        that:
          - readio_deploy_user is defined
          - readio_deploy_user | length > 0
        msg: "readio_deploy_user must be defined in GitHub variables."

    - name: Warn if SSH keys are missing (Deployment will likely fail later)
      ansible.builtin.debug:
        msg: "WARNING: readio_deploy_user_ssh_keys is empty. Existing authorized_keys on the VPS will NOT be updated. This may cause deployment CI to fail if keys don't match."
      when: readio_deploy_user_ssh_keys is not defined or readio_deploy_user_ssh_keys | length == 0

    - name: Validate sudo allowlist exists
      ansible.builtin.assert:
        that:
          - readio_sudo_command_allowlist is defined
        msg: "readio_sudo_command_allowlist must be defined (can be empty)."

    - name: Validate Nginx site source exists on controller
      ansible.builtin.stat:
        path: "{{ readio_nginx_site_source }}"
      delegate_to: localhost
      become: false
      register: readio_nginx_site_source_stat

    - name: Fail when Nginx site source is missing
      ansible.builtin.assert:
        that:
          - readio_nginx_site_source_stat.stat.exists
        fail_msg: "Nginx site source not found at {{ readio_nginx_site_source }}."

    - name: Remove default Nginx site to prevent conflicts
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  tasks:
    - name: Install base apt packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - nginx
          - sudo
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Docker apt signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        owner: root
        group: root
        mode: "0644"

    - name: Configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_arch_map.get(ansible_architecture, ansible_architecture) }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Ensure Nginx service is enabled and running
      ansible.builtin.service:
        name: nginx
        enabled: true
        state: started

    - name: Ensure deployment user properties and Docker group membership
      ansible.builtin.user:
        name: "{{ readio_deploy_user }}"
        shell: "{{ readio_deploy_user_shell }}"
        groups:
          - docker
        append: true
        home: "{{ readio_deploy_user_home }}"
        create_home: true
        state: present

    - name: Ensure deployment SSH directory exists
      ansible.builtin.file:
        path: "{{ readio_deploy_user_home }}/.ssh"
        state: directory
        owner: "{{ readio_deploy_user }}"
        group: "{{ readio_deploy_user }}"
        mode: "0700"

    - name: Configure authorized SSH keys for deployment user
      ansible.builtin.authorized_key:
        user: "{{ readio_deploy_user }}"
        key: "{{ readio_deploy_user_ssh_keys | join('\n') }}"
        state: present
        exclusive: true
      when: readio_deploy_user_ssh_keys is defined and readio_deploy_user_ssh_keys | length > 0

    - name: Configure scoped passwordless sudo allowlist
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/readio-{{ readio_deploy_user }}"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
        content: |
          {{ readio_deploy_user }} ALL=(root) NOPASSWD: {{ readio_sudo_command_allowlist | join(', ') }}
      when: readio_sudo_command_allowlist | length > 0

    - name: Remove Readio sudoers file when no allowlist is configured
      ansible.builtin.file:
        path: "/etc/sudoers.d/readio-{{ readio_deploy_user }}"
        state: absent
      when: readio_sudo_command_allowlist | length == 0

    - name: Ensure Readio environment parent directories exist
      ansible.builtin.file:
        path: "{{ item | dirname }}"
        state: directory
        owner: "{{ readio_deploy_user }}"
        group: docker
        mode: "0770"
      loop:
        - "{{ readio_pre_data_root }}"
        - "{{ readio_prod_data_root }}"

    - name: Ensure Readio data directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ readio_deploy_user }}"
        group: docker
        mode: "{{ readio_data_directory_mode }}"
      loop:
        - "{{ readio_pre_data_root }}"
        - "{{ readio_prod_data_root }}"

    - name: Ensure Nginx snippets directory exists
      ansible.builtin.file:
        path: /etc/nginx/snippets
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Fetch latest Cloudflare IPv4 addresses
      ansible.builtin.uri:
        url: https://api.cloudflare.com/client/v4/ips
        return_content: true
      register: cloudflare_ips_response

    - name: Generate Cloudflare Real-IP snippet from official API
      ansible.builtin.copy:
        dest: /etc/nginx/snippets/cloudflare-realip.conf
        content: |
          # Generated from official Cloudflare API
          {% for ip in cloudflare_ips_response.json.result.ipv4_cidrs %}
          set_real_ip_from {{ ip }};
          {% endfor %}
          {% for ip in cloudflare_ips_response.json.result.ipv6_cidrs %}
          set_real_ip_from {{ ip }};
          {% endfor %}
          real_ip_header CF-Connecting-IP;
        owner: root
        group: root
        mode: "0644"
      notify:
        - Validate Nginx configuration
        - Reload Nginx

    - name: Render Readio Nginx site into sites-available
      ansible.builtin.copy:
        src: "{{ readio_nginx_site_source }}"
        dest: "{{ readio_nginx_sites_available_dir }}/{{ readio_nginx_site_name }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Validate Nginx configuration
        - Reload Nginx

    - name: Explicitly validate Nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Enable Readio Nginx site when requested
      ansible.builtin.file:
        src: "{{ readio_nginx_sites_available_dir }}/{{ readio_nginx_site_name }}"
        dest: "{{ readio_nginx_sites_enabled_dir }}/{{ readio_nginx_site_name }}"
        state: link
        owner: root
        group: root
      notify:
        - Validate Nginx configuration
        - Reload Nginx
      when: readio_nginx_enable_site | bool

    - name: Ensure journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure journald size limits
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/readio-cloud.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Journal]
          SystemMaxUse={{ readio_journald_system_max_use }}
          RuntimeMaxUse={{ readio_journald_runtime_max_use }}
          MaxRetentionSec={{ readio_journald_max_retention_sec }}
      notify: Restart systemd-journald

    - name: Render documented conservative sysctl settings
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop: "{{ readio_sysctl_settings }}"

    - name: Mask redundant services to save memory
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
        enabled: false
        state: stopped
      loop: "{{ readio_redundant_services }}"
      failed_when: false

    - name: Configure APT to automatically clean downloaded packages
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/01clean
        content: 'Binary::apt::APT::Keep-Downloaded-Packages "0";'
        owner: root
        group: root
        mode: "0644"

    - name: Configure Bash aliases for deployment user
      ansible.builtin.blockinfile:
        path: "{{ readio_deploy_user_home }}/.bashrc"
        block: "{{ readio_bash_aliases }}"
        marker: "# {mark} READIO CUSTOM ALIASES"
        create: true
        owner: "{{ readio_deploy_user }}"
        group: "{{ readio_deploy_user }}"
        mode: "0644"

    - name: Enable Tmux mouse mode for deployment user
      ansible.builtin.copy:
        dest: "{{ readio_deploy_user_home }}/.tmux.conf"
        content: "set -g mouse on"
        owner: "{{ readio_deploy_user }}"
        group: "{{ readio_deploy_user }}"
        mode: "0644"

    - name: Manage unattended-upgrades only when explicitly requested
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
      when: readio_manage_unattended_upgrades | bool

  handlers:
    - name: Validate Nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Restart systemd-journald
      ansible.builtin.service:
        name: systemd-journald
        state: restarted

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false
