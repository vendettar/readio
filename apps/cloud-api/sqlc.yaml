version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/schema.sql"
    queries: "internal/db/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: false
